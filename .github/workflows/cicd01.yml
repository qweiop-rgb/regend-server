name: Depoloy To EC2

on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ssh로 EC2돌리기
        uses: appleboy/ssh-action@v1
        env:
          APRICATION_PROPERTIES: &{{secrets.APRICATION_PROPERTIS}}

        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          script_stop:
          script:
            cd /home/ubuntu/regend-server
            rm -rf src/main.resorces/application.yml
            git pull origin main
            echo "$APRICATION_PROPERTIS" > src/main/resourcation.yml
            .gradlew clean build -x test
            sudo fuser -k -n top 80 || ture
            sudo nohup java -jar build/libs/*SNAPSHOT.jar > ./output.log 2>&1 &